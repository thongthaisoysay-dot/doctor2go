<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctortor2Go</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div class="logo-scene">
        <img src="Doctor2Go.png" alt="Doctor2Go" class="logo" />
        <img src="Car.png" alt="" class="car" aria-hidden="true" />
      </div>
      <div id="step1" style="display: none">
        <h1>เลือกประเภทการสมัคร</h1>
        <button id="btn-individual">บุคคล</button>
        <button id="btn-corporate">บริษัท</button>
      </div>

      <div id="step1b" style="display: none">
        <button id="btn-create-company">สร้างบริษัทใหม่</button>
        <button id="btn-join-company">เข้าร่วมบริษัทที่มีอยู่</button>
      </div>
      <div id="step2" style="display: none">
        <h2 id="step2-title">กรอกข้อมูลของคุณ</h2>

        <input
          type="text"
          id="input-company-name"
          placeholder="ชื่อบริษัท"
          style="display: none"
        />
        <input
          type="text"
          id="input-company-code"
          placeholder="ใส่รหัสบริษัทของคุณเลย"
          style="display: none"
        />
        <input type="text" id="input-name" placeholder="ชื่อ-นามสกุล" />
        <input type="tel" id="input-phone" placeholder="เบอร์โทรศัพท์" />
        <select id="input-category"></select>
        <input type="email" id="input-email" placeholder="อีเมล (ไม่บังคับ)" />
        <button id="btn-step2-next">ถัดไป</button>
      </div>
      <div id="step3" style="display: none">
        <p class="otp-hint">เราส่งรหัส 6 หลักไปที่เบอร์ของคุณแล้ว</p>
        <input
          type="text"
          id="input-otp"
          placeholder="รหัส OTP"
          inputmode="numeric"
        />
        <div id="recaptcha-container"></div>
        <button id="btn-verify-otp">ยืนยัน</button>
      </div>
      <div id="step4" style="display: none">
        <h2>ยินดีต้อนรับสู่<br />Doctor2GO Travel Network</h2>
        <p id="result-member-code"></p>
        <p id="result-member-type"></p>
        <p id="result-payment-schedule"></p>
        <p id="result-company-code"></p>
        <button id="btn-save-contact">บันทึกเบอร์ Doctor2Go</button>
        <p id="doctor2go-phone" style="display: none"></p>
        <a id="link-call" href="" style="display: none">โทรเลย</a>
      </div>
      <div id="step-myprofile" style="display: none">
        <h2>Profile</h2>
        <p id="profile-category"></p>
        <p id="profile-companyname"></p>
        <p id="profile-createdAt"></p>
        <p id="profile-email"></p>
        <p id="profile-line-user-id"></p>
        <p id="profile-member-code"></p>
        <p id="profile-member-type"></p>
        <p id="profile-name"></p>
        <p id="profile-payment-Schedule"></p>
        <p id="profile-Phone-user-number"></p>
        <p id="profile-role"></p>
        <p id="profile-company-code"></p>
      </div>
      <p id="status">กำลังโหลด...</p>
    </div>

    <script
      charset="utf-8"
      src="https://static.line-scdn.net/liff/edge/2/sdk.js"
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
