<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctortor2Go</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div class="logo-scene">
        <img src="Doctor2Go.png" alt="Doctor2Go" class="logo" />
        <img src="Car.png" alt="" class="car" aria-hidden="true" />
      </div>
      <div id="step1" style="display: none">
        <h1>Choose your account type</h1>
        <button id="btn-individual">Individual</button>
        <button id="btn-corporate">Company</button>
      </div>
      <div id="step-invite" style="display: none">
        <h2>You've been invited</h2>
        <p>Enter your details to join your company's account.</p>
        <input type="text" id="input-invite-name" placeholder="Full name" />
        <input type="tel" id="input-invite-phone" placeholder="Phone number" />
        <button id="btn-invite-next">Next</button>
      </div>
      <div id="step2" style="display: none">
        <h2 id="step2-title">Enter your details</h2>

        <div class="company-name-wrap">
          <input
            type="text"
            id="input-company-name"
            placeholder="Company Name"
            style="display: none"
            autocomplete="off"
          />
          <div
            id="company-suggestions"
            class="suggestions-list"
            style="display: none"
          ></div>
        </div>
        <input type="text" id="input-name" placeholder="Full name" />
        <input type="tel" id="input-phone" placeholder="Phone number" />
        <select id="input-category"></select>
        <input type="email" id="input-email" placeholder="Company email" />
        <button id="btn-step2-next">Next</button>
      </div>
      <div id="step3" style="display: none">
        <p class="otp-hint">We've sent an OTP to your phone</p>
        <input
          type="text"
          id="input-otp"
          placeholder="OTP code"
          inputmode="numeric"
        />
        <div id="recaptcha-container"></div>
        <button id="btn-verify-otp">Verify</button>
      </div>
      <div id="step4" style="display: none">
        <h2>Welcome to Doctor2GO Travel Network.</h2>
        <h4>
          We're here to help when travelers need medical advice or a doctor
        </h4>
        <p id="result-member-code"></p>
        <p id="result-member-type"></p>
        <p id="result-payment-schedule"></p>
        <button id="btn-save-contact">Save Doctor2Go Number</button>
        <p id="doctor2go-phone" style="display: none"></p>
        <a id="link-call" href="" style="display: none">Call now</a>
      </div>
      <div id="step-myprofile" style="display: none">
        <h2>Profile</h2>
        <p id="profile-category"></p>
        <p id="profile-companyname"></p>
        <p id="profile-createdAt"></p>
        <p id="profile-email"></p>
        <p id="profile-line-user-id"></p>
        <p id="profile-member-code"></p>
        <p id="profile-member-type"></p>
        <p id="profile-name"></p>
        <p id="profile-payment-Schedule"></p>
        <p id="profile-Phone-user-number"></p>
        <p id="profile-role"></p>
        <button id="btn-invite-member" style="display: none">
          Invite a Member
        </button>
        <p id="invite-link" style="display: none"></p>
      </div>
      <p id="status">Loading...</p>
    </div>

    <script
      charset="utf-8"
      src="https://static.line-scdn.net/liff/edge/2/sdk.js"
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
