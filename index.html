<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctortor2Go</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="step1">
        <h1>คุณสมัครในนามใด</h1>
        <button id="btn-individual">บุคคล</button>
        <button id="btn-corporate">บริษัท</button>
      </div>
      <div id="step2" style="display: none">
        <h2 id="step2-title">กรอกเลยดิ่</h2>
        <input type="text" id="input-company-name" style="display: none" />
        <input type="text" id="input-name" />
        <input type="tel" id="input-phone" />
        <select id="input-category"></select>
        <input type="email" id="input-email" />
        <button id="btn-step2-next">ถัดไป</button>
      </div>
      <div id="step3" style="display: none">
        <input type="text" id="input-otp" />
        <div id="recaptcha-container"></div>
        <button id="btn-verify-otp">ยืนยัน</button>
      </div>
      <div id="step4" style="display: none">
        <h2>ยินดีต้อนรับสู่Doctor2GO Travel Network</h2>
        <p id="result-member-code"></p>
        <p id="result-member-type"></p>
        <p id="result-payment-schedule"></p>
        <button id="btn-save-contact">บันทึกเบอร์ Doctor2Go</button>
        <p id="doctor2go-phone" style="display: none"></p>
        <a id="link-call" href="" style="display: none">โทรเลย</a>
      </div>
      <p id="status">กำลังโหลด...</p>
    </div>

    <script
      charset="utf-8"
      src="https://static.line-scdn.net/liff/edge/2/sdk.js"
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
